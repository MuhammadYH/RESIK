<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — POROS Buyer</title>
  <link rel="stylesheet" href="/dashboard/shared/css/shared.css"/>
  <link rel="stylesheet" href="/dashboard/shared/css/layout.css"/>
  <link rel="stylesheet" href="/dashboard/shared/css/components.css"/>
  <link rel="stylesheet" href="/dashboard/shared/css/navbar.css"/>
  <style>
    .placeholder-wrap {
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; min-height:60vh; gap:var(--space-4); text-align:center;
    }
    .placeholder-badge {
      background:var(--primary-green-soft); color:var(--primary-green);
      font-size:var(--font-size-sm); font-weight:700;
      padding:4px 12px; border-radius:var(--radius-full);
      text-transform:uppercase; letter-spacing:.05em;
    }
  </style>
</head>
<body data-navbar-title="Dashboard">

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="admin-shell">
  <aside class="admin-sidebar" id="adminSidebar">
    <div class="sidebar-logo">
      <img src="/assets/LOGO_POROS.png" alt="POROS" class="sidebar-logo-img"/>
    </div>
    <nav class="sidebar-nav">
      <a class="sidebar-nav-item active" data-page="index.html" href="/dashboard/buyer/index.html">
        <span class="nav-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </span>
        Dashboard
      </a>
    </nav>
    <div class="sidebar-user">
      <div class="user-avatar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#2E7D32"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
      <div class="user-info">
        <div class="user-name">-</div>
        <div class="user-email">-</div>
      </div>
    </div>
  </aside>

  <main class="admin-main">
    <header class="admin-topbar"></header>
    <div class="admin-content">
      <div class="placeholder-wrap">
        <span class="placeholder-badge">buyer</span>
        <h2 style="font-size:var(--font-size-2xl); font-weight:800;">
          Dashboard Buyer — Segera Hadir
        </h2>
        <p style="color:var(--text-muted); max-width:360px;">
          Halaman ini akan diisi pada batch selanjutnya. Role guard sudah aktif.
        </p>
        <button class="btn btn-ghost" data-logout>Keluar</button>
      </div>
    </div>
  </main>
</div>

<script src="/dashboard/shared/js/supabaseClient.js"></script>
<script src="/dashboard/shared/js/auth.js"></script>
<script src="/dashboard/shared/js/session.js"></script>
<script src="/dashboard/shared/js/logout.js"></script>
<script src="/dashboard/shared/js/api.js"></script>
<script src="/dashboard/shared/js/redirect.js"></script>
<script src="/dashboard/shared/js/roleGuard.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    const ctx = await RESIK_GUARD.protect(['buyer']);
    if (!ctx) return;
    const nameEl  = document.querySelector('.user-name');
    const emailEl = document.querySelector('.user-email');
    if (nameEl  && ctx.profile?.full_name) nameEl.textContent  = ctx.profile.full_name;
    if (emailEl && ctx.user?.email)        emailEl.textContent = ctx.user.email;
  });
</script>
</body>
</html>
