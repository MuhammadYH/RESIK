<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riwayat — POROS Admin</title>

  <!-- Shared Styles -->
  <link rel="stylesheet" href="/dashboard/shared/css/shared.css">
  <link rel="stylesheet" href="/dashboard/shared/css/layout.css">
  <link rel="stylesheet" href="/dashboard/shared/css/components.css">
  <link rel="stylesheet" href="css/admin-riwayat.css">
  <link rel="stylesheet" href="/dashboard/shared/css/navbar.css"/>
</head>
<body data-navbar-title="Riwayat" data-sidebar-role="admin" data-sidebar-page="riwayat.html">

<div class="admin-shell">
  <div id="sidebar-mount"></div>

  <!-- ── SIDEBAR ── -->
  

  <!-- Overlay (mobile) -->

  <!-- ── MAIN ── -->
  <main class="admin-main">

    <!-- Topbar -->
    <header class="admin-topbar"></header>

    <!-- ── CONTENT ── -->
    <div class="admin-content">

      <!-- ── STAT CARDS ── -->
      <div class="riwayat-stats">

        <!-- Total Aktivitas -->
        <div class="stat-card">
          <div class="stat-card-content">
            <div class="stat-card-label">Total Aktivitas</div>
            <div class="stat-card-value" data-count="1248" data-suffix="">0</div>
            <div class="stat-trend up">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>
              18% dari bulan lalu
            </div>
            <div class="stat-sparkline">
              <svg id="spark-aktivitas" width="80" height="30" class="sparkline-svg"></svg>
            </div>
          </div>
          <div class="stat-card-icon green">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
            </svg>
          </div>
        </div>

        <!-- Sampah Terkelola -->
        <div class="stat-card">
          <div class="stat-card-content">
            <div class="stat-card-label">Sampah Terkelola</div>
            <div class="stat-card-value" data-count="24.5" data-suffix=" ton">0</div>
            <div class="stat-trend up">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>
              16% dari bulan lalu
            </div>
            <div class="stat-sparkline">
              <svg id="spark-sampah" width="80" height="30" class="sparkline-svg"></svg>
            </div>
          </div>
          <div class="stat-card-icon green">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
              <line x1="3" y1="6" x2="21" y2="6"/>
              <path d="M16 10a4 4 0 0 1-8 0"/>
            </svg>
          </div>
        </div>

        <!-- Pengiriman -->
        <div class="stat-card">
          <div class="stat-card-content">
            <div class="stat-card-label">Pengiriman</div>
            <div class="stat-card-value" data-count="352" data-suffix="">0</div>
            <div class="stat-trend up">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>
              12% dari bulan lalu
            </div>
            <div class="stat-sparkline">
              <svg id="spark-pengiriman" width="80" height="30" class="sparkline-svg"></svg>
            </div>
          </div>
          <div class="stat-card-icon green">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <rect x="1" y="3" width="15" height="13"/><path d="M16 8h4l3 3v5h-7V8z"/>
              <circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>
            </svg>
          </div>
        </div>

        <!-- Efisiensi -->
        <div class="stat-card">
          <div class="stat-card-content">
            <div class="stat-card-label">Efisiensi Rata-rata</div>
            <div class="stat-card-value" data-count="89" data-suffix="%">0</div>
            <div class="stat-trend up">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>
              7% dari bulan lalu
            </div>
            <div class="stat-sparkline">
              <svg id="spark-efisiensi" width="80" height="30" class="sparkline-svg"></svg>
            </div>
          </div>
          <div class="stat-card-icon green">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M17 8C8 10 5.9 16.17 3.82 21L5.71 22l1-2.3A4.49 4.49 0 0 0 8 20C19 20 22 3 22 3c-1 2-8 2-8 2s-1-7-7-3c2 0 7.5 2 7 4 0 0-3 0-5 3z"/>
            </svg>
          </div>
        </div>

      </div>
      <!-- /riwayat-stats -->


      <!-- ── FILTER BAR ── -->
      <div class="riwayat-filter-bar">

        <!-- Date filter -->
        <div class="filter-select-wrap">
          <span class="select-icon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
          </span>
          <select id="filter-date">
            <option value="">Semua Tanggal</option>
            <option value="today">Hari Ini</option>
            <option value="week">7 Hari Terakhir</option>
            <option value="month">Bulan Ini</option>
            <option value="custom">Pilih Tanggal...</option>
          </select>
          <span class="chevron-icon">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </span>
        </div>

        <!-- Jenis filter -->
        <div class="filter-select-wrap">
          <select id="filter-jenis">
            <option value="">Semua Jenis Aktivitas</option>
            <option value="pengambilan">Pengambilan Sampah</option>
            <option value="smartbin">Smart Bin Penuh</option>
            <option value="sensor">Sensor Update</option>
            <option value="pengiriman">Pengiriman</option>
            <option value="maintenance">Maintenance</option>
            <option value="peringatan">Peringatan</option>
            <option value="laporan">Laporan Harian</option>
          </select>
          <span class="chevron-icon">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </span>
        </div>

        <!-- Lokasi filter -->
        <div class="filter-select-wrap">
          <select id="filter-lokasi">
            <option value="">Semua Lokasi</option>
            <option value="darul-ulum">Pondok Pesantren Darul Ulum</option>
            <option value="al-hikmah">Pondok Pesantren Al Hikmah</option>
            <option value="nurul-huda">Pondok Pesantren Nurul Huda</option>
            <option value="al-falah">Pondok Pesantren Al Falah</option>
          </select>
          <span class="chevron-icon">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </span>
        </div>

        <!-- Reset -->
        <div class="filter-reset" id="filter-reset">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <polyline points="1 4 1 10 7 10"/>
            <path d="M3.51 15a9 9 0 1 0 .49-3.46"/>
          </svg>
          Reset Filter
        </div>
      </div>


      <!-- ── ACTIVITY TABLE ── -->
      <div class="riwayat-table-card">

        <div class="riwayat-table-wrap">
          <table class="riwayat-table">
            <thead>
              <tr>
                <th class="col-waktu">Waktu</th>
                <th class="col-jenis">Jenis Aktivitas</th>
                <th class="col-lokasi">Lokasi</th>
                <th class="col-detail">Detail</th>
                <th class="col-jumlah">Jumlah</th>
                <th class="col-status">Status</th>
                <th class="col-oleh">Oleh</th>
              </tr>
            </thead>
            <tbody id="riwayat-tbody">
              <!-- Populated by admin-riwayat.js -->
            </tbody>
          </table>
        </div>

        <!-- Pagination footer -->
        <div class="riwayat-footer">
          <span class="riwayat-count" id="riwayat-count">Menampilkan 1 - 7 dari 1.248 aktivitas</span>
          <div class="pagination" id="pagination"></div>
        </div>

      </div>
      <!-- /riwayat-table-card -->

    </div>
    <!-- /admin-content -->

  </main>
</div>

<!-- ── SCRIPTS ── -->
  <!-- Shared core (Batch 2-3) -->
  <script src="/dashboard/shared/js/supabaseClient.js"></script>
  <script src="/dashboard/shared/js/auth.js"></script>
  <script src="/dashboard/shared/js/session.js"></script>
  <script src="/dashboard/shared/js/logout.js"></script>
  <script src="/dashboard/shared/js/api.js"></script>
  <script src="/dashboard/shared/js/redirect.js"></script>
  <script src="/dashboard/shared/js/roleGuard.js"></script>
    <script src="/dashboard/shared/components/sidebar.js"></script>
  <script src="/dashboard/shared/components/navbar.js"></script>
  <script src="js/admin-riwayat.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const ctx = await RESIK_GUARD.protect(['admin']);
      if (!ctx) return;
      // Render sidebar with user context
      RESIK_SIDEBAR.render({
        role       : 'admin',
        currentPage: 'riwayat.html',
        user       : { ...(ctx.profile || {}), email: ctx.user?.email },
      });
    });
  </script>
</body>
</html>
