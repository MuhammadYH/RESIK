<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notifikasi — POROS Admin</title>

  <link rel="stylesheet" href="/dashboard/shared/css/shared.css"/>
  <link rel="stylesheet" href="/dashboard/shared/css/layout.css"/>
  <link rel="stylesheet" href="/dashboard/shared/css/components.css"/>
  <link rel="stylesheet" href="css/admin-notifikasi.css"/>
  <link rel="stylesheet" href="/dashboard/shared/css/navbar.css"/>
</head>
<body data-navbar-title="Notifikasi" data-sidebar-role="admin" data-sidebar-page="notifikasi.html">

<div id="sidebar-mount"></div>

  <!-- MAIN -->
  <main class="admin-main">

    <!-- TOPBAR -->
    <header class="admin-topbar"></header>

    <!-- CONTENT -->
    <div class="admin-content">

      <!-- Notification Card -->
      <div class="notif-card">

        <!-- Tabs + Mark All -->
        <div class="notif-tabs-bar">
          <div class="admin-tabs" style="margin-bottom:0; border-bottom:none;">
            <button class="admin-tab active" data-tab="semua">Semua</button>
            <button class="admin-tab" data-tab="belum">Belum Dibaca</button>
            <button class="admin-tab" data-tab="dibaca">Dibaca</button>
          </div>
          <button class="notif-mark-all" id="btn-mark-all">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            Tandai semua sebagai dibaca
          </button>
        </div>

        <!-- Table header -->
        <div class="notif-list-header">
          <span>Notifikasi</span>
          <span>Waktu</span>
        </div>

        <!-- List -->
        <div class="notif-list" id="notif-list"></div>

        <!-- Footer -->
        <div class="notif-footer">
          <span class="notif-count-text" id="notif-count-text">Menampilkan 1 - 6 dari 6 notifikasi</span>
        </div>

      </div>

    </div><!-- /admin-content -->
  </main>
</div><!-- /admin-shell -->
  <!-- Shared core (Batch 2-3) -->
  <script src="/dashboard/shared/js/supabaseClient.js"></script>
  <script src="/dashboard/shared/js/auth.js"></script>
  <script src="/dashboard/shared/js/session.js"></script>
  <script src="/dashboard/shared/js/logout.js"></script>
  <script src="/dashboard/shared/js/api.js"></script>
  <script src="/dashboard/shared/js/redirect.js"></script>
  <script src="/dashboard/shared/js/roleGuard.js"></script>
    <script src="/dashboard/shared/components/sidebar.js"></script>
  <script src="/dashboard/shared/components/navbar.js"></script>
  <script src="js/admin-notifikasi.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const ctx = await RESIK_GUARD.protect(['admin']);
      if (!ctx) return;
      // Render sidebar with user context
      RESIK_SIDEBAR.render({
        role       : 'admin',
        currentPage: 'notifikasi.html',
        user       : { ...(ctx.profile || {}), email: ctx.user?.email },
      });
    });
  </script>
</body>
</html>
