<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — RESIK</title>
  <link rel="stylesheet" href="assets/css/main.css" />

  <style>
    /* ── Loading Overlay (wajib di setiap halaman protected) ── */
    #resik-loading-overlay {
      position: fixed; inset: 0;
      background: rgba(255,255,255,.9);
      display: none; align-items: center; justify-content: center;
      z-index: 9999; flex-direction: column; gap: .75rem; color: #2d6a4f;
    }
    #resik-loading-overlay .spinner {
      width: 44px; height: 44px;
      border: 3px solid #e0e0e0; border-top-color: #2d6a4f;
      border-radius: 50%; animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- ══ Loading Overlay ══ -->
  <div id="resik-loading-overlay">
    <div class="spinner"></div>
    <span>Memverifikasi sesi...</span>
  </div>

  <!-- ══ Konten Dashboard (tersembunyi sampai sesi valid) ══ -->
  <div id="dashboard-content" style="display:none">

    <!-- Nav: gunakan data-resik-* untuk auto-fill -->
    <nav class="topnav">
      <span>RESIK</span>
      <div class="user-info">
        <img data-resik-avatar alt="Avatar" width="32" height="32" style="border-radius:50%" />
        <strong data-resik-name></strong>
        <small data-resik-role></small>
        <button id="btn-logout" class="btn btn-sm">Keluar</button>
      </div>
    </nav>

    <main>
      <h1>Selamat datang, <span data-resik-name></span>!</h1>
      <p>Role kamu: <strong data-resik-role></strong></p>
      <p>Email: <span data-resik-email></span></p>
      <p>Organisasi: <span data-resik-org>—</span></p>
    </main>

  </div>

  <!-- ══ Scripts ══ -->
  <script src="assets/js/resik-supabase.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/session.js"></script>

  <script>
    // ─────────────────────────────────────────────────────
    // CARA PROTEKSI HALAMAN — salin snippet ini ke setiap
    // halaman dashboard yang butuh proteksi.
    //
    // Ganti allowedRoles sesuai halaman:
    //   dashboard-admin.html   → ['admin']
    //   dashboard-provider.html → ['provider']
    //   dashboard-pengolah.html → ['pengolah']
    //   dashboard-buyer.html   → ['buyer']
    //   dashboard.html (umum) → [] (semua role)
    // ─────────────────────────────────────────────────────

    document.addEventListener('DOMContentLoaded', async () => {

      // ── 1. Guard: cek sesi & role ──
      const result = await RESIK_SESSION.requireAuth({
        allowedRoles  : [],          // kosong = semua role boleh
        redirectTo    : '/login.html',
        forbiddenPage : '/403.html',
      });

      if (!result) return; // redirect sedang berjalan

      // ── 2. Tampilkan konten setelah verified ──
      document.getElementById('dashboard-content').style.display = 'block';

      // ── 3. Tombol Logout ──
      document.getElementById('btn-logout')?.addEventListener('click', async () => {
        if (confirm('Yakin ingin keluar?')) {
          await RESIK_AUTH_CORE.logoutUser();
        }
      });

      // ── 4. Dengarkan perubahan auth (token expired, dll.) ──
      await RESIK_SESSION.listenAuthChanges((event) => {
        if (event === 'SIGNED_OUT') {
          window.location.href = '/login.html';
        }
      });

      // ── 5. Akses data user dari cache (tanpa async) ──
      const { user, profile } = result;
      console.log('User:', user.email, '| Role:', profile?.role);

    });
  </script>

</body>
</html>
